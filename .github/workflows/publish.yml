name: Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore: version packages')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install npm >=11.5 for Trusted Publishing
        run: |
          npm install -g npm@latest --prefix "$HOME/.npm-trusted"
          echo "$HOME/.npm-trusted/bin" >> "$GITHUB_PATH"

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - name: Publish to npm
        run: pnpm changeset:publish --no-git-tag

      - name: Create git tags and GitHub Releases
        run: |
          for pkg_json in $(find packages -name 'package.json' -not -path '*/node_modules/*'); do
            name=$(jq -r '.name' "$pkg_json")
            version=$(jq -r '.version' "$pkg_json")
            private=$(jq -r '.private // false' "$pkg_json")
            if [ "$private" = "true" ]; then continue; fi

            tag="${name}@${version}"
            if ! gh release view "$tag" > /dev/null 2>&1; then
              echo "Creating release for $tag"
              gh release create "$tag" \
                --title "$tag" \
                --generate-notes \
                --target "${{ github.event.pull_request.merge_commit_sha }}" \
                --latest=false
            else
              echo "Release $tag already exists, skipping"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs.yml',
              ref: 'main',
            });
