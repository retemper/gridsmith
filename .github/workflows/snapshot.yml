name: Snapshot Release

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  snapshot:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/snapshot') &&
      (github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'OWNER' ||
      github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Get PR head ref
        id: pr
        run: |
          echo "ref=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq .head.ref)" >> "$GITHUB_OUTPUT"
          echo "sha=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq .head.sha)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo build

      - name: Create snapshot versions
        run: pnpm changeset:version --snapshot "pr${{ github.event.issue.number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snapshot to npm
        run: pnpm changeset:publish --tag "pr${{ github.event.issue.number }}" --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment install instructions on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const prNumber = context.issue.number;
            const tag = `pr${prNumber}`;
            const body = [
              `📦 **Snapshot published!**`,
              ``,
              `Install with:`,
              `\`\`\`bash`,
              `pnpm add @gridsmith/core@${tag}`,
              `\`\`\``,
              ``,
              `> All changed packages are available under the \`${tag}\` dist-tag.`,
              `> Snapshot: \`${{ steps.pr.outputs.sha }}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
